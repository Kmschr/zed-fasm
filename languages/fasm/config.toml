name = "FASM"
grammar = "asm"
path_suffixes = ["asm", "fasm"]
line_comments = ["; "]
autoclose_before = ";:.,=}])"

[[brackets]]
start = "{"
end = "}"
close = true
newline = true

[[brackets]]
start = "["
end = "]"
close = true
newline = false

[[brackets]]
start = "("
end = ")"
close = true
newline = false

[[brackets]]
start = "\""
end = "\""
close = true
newline = false
